{% comment %}Compact 24h event-count sparkline for issue/project list rows.{% endcomment %}
{% if event_sparkline %}
<div title="{{ event_sparkline.title }}" class="w-24">
    <div class="flex h-8 items-end gap-px">
        {% for bucket in event_sparkline.event_buckets %}
            <div title="{{ bucket.title }}" class="flex h-8 flex-1 items-end">
                {% if bucket.count %}
                    <div class="w-full bg-cyan-500" style="height: {{ bucket.pct }}%;"></div>
                {% else %}
                    <div class="h-0.5 w-full bg-slate-300 dark:bg-slate-500"></div>
                {% endif %}
            </div>
        {% endfor %}
    </div>
</div>
{% endif %}
